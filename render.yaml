services:
  - type: web
    name: nextup
    runtime: node
    buildCommand: npm install -g pnpm turbo && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @nextup/database exec prisma generate && pnpm --filter @nextup/database exec prisma db push && pnpm --filter @nextup/api build
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
